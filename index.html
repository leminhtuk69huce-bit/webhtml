<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rảnh vô đây ib</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-screen" class="screen">
        <div class="login-box">
            <h2>Chào mừng đến DeepWebChat("đùa đấy:)") </h2>
            <input type="text" id="username-input" placeholder="Nhập tên của mày vào đây">
            <button id="login-btn">Vào Chat</button>
        </div>
    </div>

    <div id="chat-screen" class="screen hidden">
        <div class="sidebar">
            <div class="user-profile">
                <span id="my-name">Tên tôi</span>
                <button id="logout-btn">Nút để đổi thân phận (Đăng xuất)</button>
            </div>
            <div class="user-list-header">Cốt</div>
            <ul id="user-list">
                </ul>
        </div>
        
        <div class="main-chat">
            <div class="chat-header">
                <h3 id="chat-with-name">Chọn một đứa để chat</h3>
            </div>
            <div id="chat-messages" class="chat-messages">
                </div>
            <div class="chat-input hidden" id="chat-input-area">
                <input type="text" id="message-input" placeholder="Nhập tin nhắn...">
                <button id="send-btn">Gửi</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="app.js"></script>
</body>
</html>
