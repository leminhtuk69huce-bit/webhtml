<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiệu ứng Trái tim Nghệ thuật</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-family: sans-serif;
            pointer-events: none;
            text-align: center;
        }
    </style>
</head>
<body>
    <canvas id="heartCanvas"></canvas>
    <div id="ui">Tặng gái múp nhoaaaa</div>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        let heartPoints = [];
        const particleCount = 1900; // Số lượng hạt
        const heartSize = 13; // Kích thước cơ bản

        // Cấu hình màu sắc
        const colors = ['#ff0a54', '#ff477e', '#ff7096', '#ff85a1', '#fbb1bd'];

        function init() {
            resize();
            createHeartPoints();
            createParticles();
            animate();
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        // Hàm toán học để vẽ hình trái tim
        function getHeartPoint(t) {
            let x = 16 * Math.pow(Math.sin(t), 3);
            let y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            return { x: x * heartSize, y: y * heartSize };
        }

        function createHeartPoints() {
            heartPoints = [];
            for (let i = 0; i < Math.PI * 2; i += 0.01) {
                heartPoints.push(getHeartPoint(i));
            }
        }

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                
                // Chọn một điểm ngẫu nhiên trên viền trái tim để làm đích đến
                const targetIdx = Math.floor(Math.random() * heartPoints.length);
                this.target = heartPoints[targetIdx];
                
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = (Math.random() - 0.5) * 4;
                this.accel = 0.02 + Math.random() * 0.05;
                this.friction = 0.94 + Math.random() * 0.04;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.size = Math.random() * 2 + 0.5;
                this.pulseOffset = Math.random() * Math.PI * 2;
            }

            update(tick) {
                // Nhịp đập (Pulsing)
                const pulse = Math.sin(tick * 0.05 + this.pulseOffset) * 5;
                const targetX = width / 2 + this.target.x * (1 + Math.sin(tick * 0.04) * 0.15);
                const targetY = height / 2 + this.target.y * (1 + Math.sin(tick * 0.04) * 0.15);

                // Lực hút về phía hình trái tim
                let dx = targetX - this.x;
                let dy = targetY - this.y;
                let dist = Math.sqrt(dx * dx + dy * dy);

                this.vx += dx * (this.accel / 10);
                this.vy += dy * (this.accel / 10);

                // Thêm một chút nhiễu loạn để tạo hiệu ứng "bay bổng" như video
                this.vx += Math.sin(tick * 0.02 + this.y * 0.01) * 0.2;
                this.vy += Math.cos(tick * 0.02 + this.x * 0.01) * 0.2;

                this.vx *= this.friction;
                this.vy *= this.friction;

                this.x += this.vx;
                this.y += this.vy;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();

                // Vẽ các tia sáng nhỏ (glow)
                if (Math.random() > 0.98) {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = this.color;
                } else {
                    ctx.shadowBlur = 0;
                }
            }
        }

        function createParticles() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        let tick = 0;
        function animate() {
            // Tạo hiệu ứng mờ dần (trail effect) bằng cách vẽ lớp đen trong suốt
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, width, height);

            ctx.globalCompositeOperation = 'lighter'; // Giúp màu sắc rực rỡ hơn khi chồng lên nhau

            particles.forEach(p => {
                p.update(tick);
                p.draw();
            });

            ctx.globalCompositeOperation = 'source-over';
            tick++;
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            resize();
            createHeartPoints();
        });

        // Thêm tương tác khi click
        window.addEventListener('mousedown', (e) => {
            particles.forEach(p => {
                const dx = p.x - e.clientX;
                const dy = p.y - e.clientY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 200) {
                    p.vx += (dx / dist) * 20;
                    p.vy += (dy / dist) * 20;
                }
            });
        });

        init();
    </script>
</body>
</html>
